name: running_coach_app
description: "AI 기반 런닝 훈련 코치 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 상태관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 라우팅
  go_router: ^14.2.0

  # 네트워크
  dio: ^5.4.3+1

  # 로컬 저장소
  shared_preferences: ^2.2.3

  # 환경변수
  flutter_dotenv: ^5.1.0

  # Supabase
  supabase_flutter: ^2.5.6

  # 유틸
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
