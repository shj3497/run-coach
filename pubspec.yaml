name: running_coach_app
description: "AI 기반 런닝 훈련 코치 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 상태관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 라우팅
  go_router: ^14.2.0

  # 네트워크
  dio: ^5.4.3+1

  # 로컬 저장소
  shared_preferences: ^2.2.3

  # 환경변수
  flutter_dotenv: ^5.1.0

  # Supabase
  supabase_flutter: ^2.5.6

  # 헬스 데이터
  health: ^11.1.0

  # 딥링크 / URL
  app_links: ^6.4.0
  url_launcher: ^6.3.1

  # 위치
  geolocator: ^13.0.2

  # 차트
  fl_chart: ^0.70.2

  # 알림
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

  # 유틸
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
